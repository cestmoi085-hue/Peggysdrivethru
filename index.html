<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peggy's Drive-thru: Phonics</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f8f9fa; padding: 20px; }
        #game-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 600px; width: 100%; }
        .quiz-area { display: flex; justify-content: center; gap: 15px; margin: 30px 0; min-height: 80px; align-items: center; flex-wrap: wrap; }
        .syllable-block { padding: 15px 20px; background: #e9ecef; border-radius: 10px; font-size: 2rem; font-weight: bold; color: #495057; border: 2px solid #dee2e6; }
        .blank-block { width: auto; min-width: 60px; height: auto; border: 3px dashed #007bff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #007bff; background: #f0f7ff; transition: all 0.3s; }
        .blank-block.error { border-color: #dc3545; background: #fff5f5; color: #dc3545; }
        .blank-block.wrong-final { border-color: #6c757d; background: #e9ecef; color: #dc3545; }
        .options-area { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .option-btn { padding: 12px 25px; font-size: 1.5rem; cursor: pointer; background: white; border: 2px solid #007bff; color: #007bff; border-radius: 50px; font-weight: bold; }
        .option-btn:disabled { opacity: 0.3; }
        .btn-main { padding: 12px 24px; font-size: 1.1rem; cursor: pointer; background: #FF8C00; color: white; border: none; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        #log { margin-top: 30px; text-align: left; font-size: 0.9rem; border-top: 2px solid #eee; padding-top: 15px; width: 100%; }
        .final-screen { padding: 40px 20px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <h2 style="color: #FF8C00;">Peggy's Drive-thru 🍟</h2>
    <p id="instruction">讀取菜單中...</p>
    
    <div id="game-content" style="display:none;">
        <button class="btn-main" onclick="playAudio()" id="playBtn">🔊 聽發音點餐</button>
        <div class="quiz-area" id="quizArea"></div>
        <div class="options-area" id="optionsArea"></div>
        <button class="btn-main" style="margin-top:20px; background:#28a745" onclick="nextQuestion()">下一份餐點 (Next)</button>
    </div>

    <div id="log">
        <strong>本日點餐記錄：</strong>
        <div id="dataRows"></div>
    </div>
</div>

<script>
    // --- 請在此處貼上妳的 Google 表格 CSV 網址 ---
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQGoncK1abaJuKI-Y92FSt77nQUuEhwZEs9B2BVuzz4qhOxYJxRD3w4X3aH28EwPq61nU_TEPtgRA3b/pub?output=csv'; 

    let quizBank = [];
    let currentIdx = 0;
    let startTime;
    let errorCount = 0;
    let isLocked = true;

    const urlParams = new URLSearchParams(window.location.search);
    const targetSource = urlParams.get('cat'); 

    async function fetchQuizData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1); 
            
            const allData = rows.map(row => {
                const cols = row.split(',');
                if(cols.length < 5) return null; 
                return {
                    source: cols[0].trim(),
                    word: cols[1].trim(),
                    blocks: cols[2].trim().split('|').map(s => s.trim()),
                    answer: cols[3].trim(),
                    options: cols[4].trim().split('|').map(s => s.trim())
                };
            }).filter(q => q !== null);

            // 1. 先篩選分類
            let filteredData = [];
            if (targetSource) {
                filteredData = allData.filter(q => q.source.toLowerCase() === targetSource.toLowerCase());
            } else {
                filteredData = allData;
            }

            // 2. --- 隨機打亂題目順序 ---
            quizBank = filteredData.sort(() => Math.random() - 0.5);

            if (quizBank.length === 0) {
                document.getElementById('instruction').innerText = "找不到該分類的菜單 (Check ?cat=)";
            } else {
                document.getElementById('instruction').innerText = `已載入「${targetSource || '全部'}」菜單 (隨機出餐中)`;
                document.getElementById('game-content').style.display = 'block';
                loadQuiz();
            }
        } catch (error) {
            document.getElementById('instruction').innerText = "讀取失敗，請確認 CSV 網址。";
        }
    }

    function loadQuiz() {
        const data = quizBank[currentIdx];
        if (!data) return;

        errorCount = 0;
        isLocked = true;
        document.getElementById('instruction').innerText = "點擊播放聽發音";
        
        const wordLength = data.word.length;
        let fontSize = "2rem"; 
        let paddingSize = "15px 20px";

        if (wordLength > 12) {
            fontSize = "1.2rem"; 
            paddingSize = "8px 12px";
        } else if (wordLength > 9) {
            fontSize = "1.5rem"; 
            paddingSize = "10px 15px";
        }

        document.getElementById('quizArea').innerHTML = data.blocks.map(b => 
            b === "??" ? 
            `<div class="blank-block" id="blank" style="font-size: ${fontSize}; padding: ${paddingSize};">?</div>` : 
            `<div class="syllable-block" style="font-size: ${fontSize}; padding: ${paddingSize};">${b}</div>`
        ).join('');

        const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);
        document.getElementById('optionsArea').innerHTML = shuffledOptions.map(opt => 
            `<button class="option-btn" onclick="checkAnswer('${opt}')">${opt}</button>`
        ).join('');
    }

    function playAudio() {
        const data = quizBank[currentIdx];
        if (!data) return;
        const msg = new SpeechSynthesisUtterance(data.word);
        msg.lang = 'en-US';
        msg.rate = 0.9; 
        window.speechSynthesis.speak(msg);

        const blank = document.getElementById('blank');
        if (blank && blank.classList.contains('error')) {
            blank.classList.remove('error');
            blank.innerText = "?";
        }
        
        if (isLocked) {
            startTime = Date.now();
            isLocked = false;
            document.getElementById('instruction').innerText = "請選出正確選項！";
        }
    }

    function checkAnswer(selected) {
        if (isLocked) return;
        const data = quizBank[currentIdx];
        const blank = document.getElementById('blank');
        const reactionTime = (Date.now() - startTime) / 1000;

        // --- 強力比對邏輯：雙方都去空格後比較 ---
        if (selected.trim() === data.answer.trim()) {
            blank.innerText = selected;
            blank.style.background = "#d4edda";
            blank.style.borderColor = "#28a745";
            disableOptions();
            logData(data.word, reactionTime, "成功");
        } else {
            errorCount++;
            if (errorCount >= 2) {
                blank.innerText = data.answer;
                blank.className = "blank-block wrong-final";
                disableOptions();
                logData(data.word, reactionTime, "失敗 (已顯示答案)");
            } else {
                blank.className = "blank-block error";
                blank.innerText = "!";
                isLocked = true;
                document.getElementById('instruction').innerText = "再試一次！請重聽發音";
            }
        }
    }

    function disableOptions() {
        const btns = document.getElementsByClassName('option-btn');
        for(let btn of btns) btn.disabled = true;
        isLocked = true;
    }

    function logData(word, time, status) {
        const row = document.createElement('div');
        row.style.padding = "5px 10px";
        row.style.margin = "5px 0";
        row.style.borderRadius = "5px";
        row.style.fontSize = "1rem";
        
        let feedback = "";
        let bgColor = "";

        if (status === "成功") {
            if (time <= 3) {
                feedback = "⭐⭐⭐ 極速！";
                bgColor = "#d4edda"; // 淺綠
            } else if (time <= 7) {
                feedback = "⭐⭐ 很棒喔";
                bgColor = "#fff3cd"; // 淺黃
            } else {
                feedback = "⭐ 慢慢來，可以更好";
                bgColor = "#f8f9fa"; // 淺灰
            }
        } else {
            feedback = "❌ 需複習";
            bgColor = "#f8d7da"; // 淺紅
        }

        row.style.backgroundColor = bgColor;
        row.innerHTML = `<b>${word}</b> | ${feedback} <small>(${time}s)</small>`;
        document.getElementById('dataRows').prepend(row);
    }
    
    function nextQuestion() {
        if (currentIdx < quizBank.length - 1) {
            currentIdx++;
            loadQuiz();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        const gameContent = document.getElementById('game-content');
        gameContent.innerHTML = `
            <div class="final-screen">
                <h1 style="font-size: 3rem;">🎉</h1>
                <h2 style="color: #28a745;">點餐完成！</h2>
                <p style="font-size: 1.1rem; color: #666;">今日菜單已全部練習完畢！<br>做的太棒了！</p>
                <button class="btn-main" onclick="location.reload()" style="background: #007bff; margin-top: 20px;">
                    重新練習 (Restart)
                </button>
            </div>
        `;
        document.getElementById('instruction').innerText = "Enjoy your meal!";
    }

    fetchQuizData();
</script>

</body>
</html>
